{% extends "base.html" %}
{% block title %}Crear Ticket - HelpDesk{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Crear Nuevo Ticket</h1>

    <form method="POST" class="bg-white rounded-xl shadow-sm border p-6 space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Titulo</label>
            <input type="text" name="titulo" required
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                placeholder="Breve descripcion del problema">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Descripcion</label>
            <textarea name="descripcion" required rows="5"
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                placeholder="Describe el problema con detalle..."></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
                <select name="categoria" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="hardware">Hardware</option>
                    <option value="software">Software</option>
                    <option value="red">Red</option>
                    <option value="correo">Correo</option>
                    <option value="otro">Otro</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Prioridad</label>
                <select name="prioridad" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="baja">Baja</option>
                    <option value="media" selected>Media</option>
                    <option value="alta">Alta</option>
                </select>
            </div>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-indigo-600 text-white px-6 py-2.5 rounded-lg hover:bg-indigo-700 transition font-medium">
                Crear Ticket
            </button>
            <a href="{{ url_for('tickets') }}" class="px-6 py-2.5 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
